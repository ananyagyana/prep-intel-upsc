$kind: http-request
name: Create Progress
method: POST
url: '{{baseUrl}}/api/progress'
order: 9000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "userId": "{{userId}}",
      "topicId": "{{topicId}}",
      "completionPercentage": 40,
      "status": "In Progress"
    }

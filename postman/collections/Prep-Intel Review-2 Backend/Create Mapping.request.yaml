$kind: http-request
name: Create Mapping
method: POST
url: '{{baseUrl}}/api/mappings'
order: 6000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "topicId": "{{topicId}}",
      "pyqId": "{{pyqId}}"
    }
